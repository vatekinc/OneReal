<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2b714"/>
      <stop offset="100%" style="stop-color:#f5c518"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- House/Building icon -->
  <g transform="translate(512, 380)">
    <!-- Main building shape -->
    <path d="M0-200 L180 0 L180 120 L-180 120 L-180 0 Z" fill="url(#accent)" opacity="0.95"/>

    <!-- Roof peak accent line -->
    <path d="M0-200 L180 0 L-180 0 Z" fill="url(#accent)" opacity="1"/>

    <!-- Windows row 1 -->
    <rect x="-130" y="20" width="60" height="45" rx="6" fill="#1a1a2e" opacity="0.7"/>
    <rect x="-30" y="20" width="60" height="45" rx="6" fill="#1a1a2e" opacity="0.7"/>
    <rect x="70" y="20" width="60" height="45" rx="6" fill="#1a1a2e" opacity="0.7"/>

    <!-- Door -->
    <rect x="-25" y="75" width="50" height="45" rx="6" fill="#1a1a2e" opacity="0.8"/>

    <!-- Door handle -->
    <circle cx="15" cy="98" r="4" fill="url(#accent)" opacity="0.8"/>
  </g>

  <!-- "OR" monogram -->
  <g transform="translate(512, 680)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="120" fill="#ffffff" letter-spacing="12">OneReal</text>
  </g>

  <!-- Subtle tagline -->
  <g transform="translate(512, 740)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif" font-weight="400" font-size="40" fill="#ffffff" opacity="0.5" letter-spacing="8">PROPERTY MANAGEMENT</text>
  </g>
</svg>
